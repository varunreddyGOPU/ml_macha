# =============================================================================
# pyproject.toml — Poetry variant
# =============================================================================
# Copy this file to your project root as `pyproject.toml` if you choose
# Poetry as your package manager.  It replaces both setup.py and the
# original pyproject.toml.
# =============================================================================

[tool.poetry]
name = "kfp-ml-library"
version = "1.0.0"
description = "A comprehensive Kubeflow Pipelines ML model deployment library"
authors = ["KFP ML Library Team <team@example.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/varunreddyGOPU/ml_macha"
repository = "https://github.com/varunreddyGOPU/ml_macha"
documentation = "https://github.com/varunreddyGOPU/ml_macha/blob/main/use.md"
keywords = ["kubeflow", "kfp", "mlops", "machine-learning", "pipeline"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
packages = [{ include = "kfp_ml_library" }]

[tool.poetry.dependencies]
python = ">=3.9,<3.13"
kfp = ">=2.5.0"
kfp-pipeline-spec = ">=0.3.0"
pandas = ">=2.1.0"
numpy = ">=1.26.0"
pyarrow = ">=14.0.0"
scipy = ">=1.11.0"
scikit-learn = ">=1.3.0"
xgboost = ">=2.0.0"
optuna = ">=3.4.0"
joblib = ">=1.3.0"
pyyaml = ">=6.0.1"
matplotlib = ">=3.8.0"
requests = ">=2.31.0"

# ---------------------------------------------------------------------------
# Optional dependency groups  (install via:  poetry install --extras "gcp")
# ---------------------------------------------------------------------------
tensorflow = { version = ">=2.15.0", optional = true }
torch = { version = ">=2.1.0", optional = true }
torchvision = { version = ">=0.16.0", optional = true }
keras = { version = ">=3.0.0", optional = true }
flaml = { version = ">=2.1.0", optional = true }
auto-sklearn = { version = ">=0.15.0", optional = true }
google-cloud-aiplatform = { version = ">=1.38.0", optional = true }
google-cloud-build = { version = ">=3.22.0", optional = true }
google-cloud-storage = { version = ">=2.13.0", optional = true }
google-cloud-bigquery = { version = ">=3.13.0", optional = true }
google-cloud-artifact-registry = { version = ">=1.9.0", optional = true }

[tool.poetry.extras]
tensorflow = ["tensorflow"]
pytorch = ["torch", "torchvision"]
keras = ["keras", "tensorflow"]
automl = ["flaml"]
automl-sklearn = ["auto-sklearn"]
gcp = [
    "google-cloud-aiplatform",
    "google-cloud-build",
    "google-cloud-storage",
    "google-cloud-bigquery",
    "google-cloud-artifact-registry",
]
all = [
    "tensorflow",
    "torch",
    "torchvision",
    "flaml",
    "google-cloud-aiplatform",
    "google-cloud-build",
    "google-cloud-storage",
    "google-cloud-bigquery",
    "google-cloud-artifact-registry",
]

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4.0"
pytest-cov = ">=4.1.0"
black = ">=23.0.0"
ruff = ">=0.1.0"
mypy = ">=1.7.0"

[tool.poetry.scripts]
kfp-ml = "kfp_ml_library:__version__"

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

# ---------------------------------------------------------------------------
# Tool configs (identical to the setuptools pyproject.toml)
# ---------------------------------------------------------------------------
[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
