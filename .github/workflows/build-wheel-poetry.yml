# ============================================================================
# GitHub Actions — Build Wheel with Poetry
# ============================================================================
# This workflow uses Poetry to resolve deps, build wheel, and publish.
# It requires:
#   - pyproject.toml with [tool.poetry] section
#   - Secret: PYPI_API_TOKEN
# ============================================================================

name: Build Wheel (Poetry)

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-poetry:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Lint
        run: |
          poetry run ruff check kfp_ml_library/
          poetry run black --check --line-length 100 kfp_ml_library/

      - name: Test
        run: poetry run pytest tests/ -v --tb=short --co -q 2>/dev/null || echo "No tests yet"

      - name: Build wheel
        run: poetry build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poetry-wheel-py${{ matrix.python-version }}
          path: dist/*

  publish-poetry:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-poetry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.8.3"

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        run: poetry publish --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}
